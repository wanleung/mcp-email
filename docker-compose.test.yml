version: "3.8"

services:
  mcp-email-service:
    build:
      context: ..
      dockerfile: mcp_email_service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - TESTING=true
      - DATABASE_URL=sqlite+aiosqlite:///./test.db
      - DEBUG=true
      - SECRET_KEY=test-secret-key-for-deployment-tests
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s